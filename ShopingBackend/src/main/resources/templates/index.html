<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <style>
        body { margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif; }
        .wrapper { max-width:520px; margin:40px auto; background:#fff;
            border-radius:8px; overflow:hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header { background:#212529; padding:32px 40px; text-align:center; }
        .header h1 { color:#fff; margin:0; font-size:22px; letter-spacing:1px; }
        .body { padding:36px 40px; }
        .body p { color:#444; font-size:15px; line-height:1.6; margin:0 0 16px; }
        .btn { display:block; width:fit-content; margin:24px auto;
            background:#212529; color:#fff !important;
            padding:14px 36px; border-radius:6px;
            text-decoration:none; font-size:15px; font-weight:bold; }
        .warning { font-size:13px; color:#999; margin-top:24px; }
        .footer { background:#f8f9fa; padding:20px 40px; text-align:center;
            font-size:12px; color:#aaa; border-top:1px solid #eee; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>Start Bootstrap Shop</h1>
    </div>
    <div class="body">
        <p>Hi <strong>{{firstName}}</strong>,</p>
        <p>We received a request to reset your password. Click the button below to choose a new one:</p>
        <a class="btn" href="{{resetLink}}">Reset My Password</a>
        <p class="warning">
            This link expires in <strong>1 hour</strong>.
            If you didn't request this, you can safely ignore this email.
        </p>
    </div>
    <div class="footer">
        &copy; 2024 Start Bootstrap Shop. All rights reserved.
    </div>
</div>
</body>
</html>
